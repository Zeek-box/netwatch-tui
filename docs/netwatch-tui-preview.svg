<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 680" width="1180" height="680" role="img" aria-labelledby="title desc">
<title id="title">Netwatch TUI preview</title>
<desc id="desc">A representative terminal preview of Netwatch TUI showing active connections, risk sorting, selected connection details, and capture controls.</desc>
